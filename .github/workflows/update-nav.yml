name: Update NAV.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,16 * * *"

permissions:
  contents: write

jobs:
  update-nav:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance openpyxl

      - name: Run updater
        env:
          FINECT_API_KEY: ${{ secrets.FINECT_API_KEY }}
          FINECT_COOKIE: ${{ secrets.FINECT_COOKIE }}
        run: |
          python Retrieve_fondos.py

      - name: Commit updated NAV.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NAV.json
          git diff --cached --quiet || git commit -m "Update NAV.json"
          git push
